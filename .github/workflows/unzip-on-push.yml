name: Unzip incoming ZIP

on:
  push:
    paths:
      - 'incoming/*.zip'
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Detect ZIP file (if push)
        id: z
        shell: bash
        run: |
          set -e
          if compgen -G "incoming/*.zip" > /dev/null; then
            FILE=$(ls incoming/*.zip | head -n 1)
            echo "file=$FILE" >> "$GITHUB_OUTPUT"
          else
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Unzip into temp dir
        if: ${{ steps.z.outputs.file != '' }}
        run: |
          mkdir -p .tmp_extract
          unzip -o "${{ steps.z.outputs.file }}" -d .tmp_extract

      - name: Resolve source dir
        if: ${{ steps.z.outputs.file != '' }}
        id: src
        shell: bash
        run: |
          set -e
          ROOT=".tmp_extract"
          COUNT=$(ls -1 "$ROOT" | wc -l | tr -d ' ')
          if [ "$COUNT" -eq 1 ]; then
            ONE=$(ls -1 "$ROOT")
            if [ -d "$ROOT/$ONE" ]; then
              echo "src=$ROOT/$ONE" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "src=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Sync website files into repo root (keep .github & incoming)
        if: ${{ steps.z.outputs.file != '' }}
        run: |
          rsync -a "${{ steps.src.outputs.src }}/" ./ \
            --exclude ".git*" \
            --exclude ".github/" \
            --exclude "incoming/"

      - name: Clean temp & remove ZIP
        if: ${{ steps.z.outputs.file != '' }}
        run: |
          rm -rf .tmp_extract
          rm -f "${{ steps.z.outputs.file }}"

      - name: Commit extracted files
        if: ${{ steps.z.outputs.file != '' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: unzip ${{ steps.z.outputs.file }} into repo root"
          add_options: '-A'
